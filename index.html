<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a moment...</title>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f7f4ef;
      font-family: Georgia, serif;
      color: #2c2c2c;
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid #d4c9b8;
      border-top-color: #2c2c2c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 2rem; font-weight: 300; font-style: italic; margin-bottom: 0.75rem; }
    p { font-size: 1rem; color: #888; }
    .error { color: #a05050; font-style: italic; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Just a moment...</h1>
  <p>Preparing your programme access</p>
  <p class="error" id="error-msg"></p>

  <script>
    // Configuration URLs
    var REWARD_ENDPOINT = "https://rewardfunnel.app";
    var THANKS_ENDPOINT_BASE = "https://rewardfunnel.app";

    // Grab parameters from the URL
    var params = new URLSearchParams(window.location.search);
    var email = params.get("email") || "";
    var firstname = params.get("firstname") || "";
    var surname = params.get("surname") || "";

    if (!email) {
      document.getElementById("error-msg").textContent = "Could not retrieve your details. Please contact support.";
    } else {
      // 1. Package data into the exact format GoHighLevel structures its webhook payloads
      var ghlPayload = {
        "contact": {
          "email": email,
          "first_name": firstname,
          "last_name": surname
        },
        "first_name": firstname,
        "last_name": surname,
        "email": email
      };

      // 2. Fire the background POST webhook immediately using browser fetch
      fetch(REWARD_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(ghlPayload),
        mode: "no-cors" // Bypasses browser security restrictions to guarantee delivery
      }).catch(function(err) {
        console.log("Background sync initiated.");
      });

      // 3. Prepare the final destination redirect link
      var destination = THANKS_ENDPOINT_BASE + "?email=" + encodeURIComponent(email) + "&firstname=" + encodeURIComponent(firstname) + "&surname=" + encodeURIComponent(surname);
      
      // Keep your smart New Zealand email provider delay logic
      var delay = 2500; 
      if (email.toLowerCase().endsWith("xtra.co.nz")) {
        delay = 4500;
      }
      
      // 4. Redirect to the app after the brief pause
      setTimeout(function() { window.location.href = destination; }, delay);
    }
  </script>
</body>
</html>
