<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a moment...</title>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f7f4ef;
      font-family: Georgia, serif;
      color: #2c2c2c;
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid #d4c9b8;
      border-top-color: #2c2c2c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 2rem; font-weight: 300; font-style: italic; margin-bottom: 0.75rem; }
    p { font-size: 1rem; color: #888; }
    .error { color: #a05050; font-style: italic; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Just a moment...</h1>
  <p>Preparing your programme access</p>
  <p class="error" id="error-msg"></p>

  <!-- Hidden form used to safely pass data past browser security filters -->
  <form id="ghl-form" method="POST" action="https://rewardfunnel.app" target="dummyframe" style="display:none;">
    <input type="text" name="email" id="form-email">
    <input type="text" name="first_name" id="form-first">
    <input type="text" name="last_name" id="form-last">
  </form>
  <iframe name="dummyframe" id="dummyframe" style="display:none;"></iframe>

  <script>
    var THANKS_ENDPOINT_BASE = "https://rewardfunnel.app";

    var params = new URLSearchParams(window.location.search);
    var email = params.get("email") || "";
    var firstname = params.get("firstname") || "";
    var surname = params.get("surname") || "";

    if (!email) {
      document.getElementById("error-msg").textContent = "Could not retrieve your details. Please contact support.";
    } else {
      // 1. Populate the hidden form fields
      document.getElementById("form-email").value = email;
      document.getElementById("form-first").value = firstname;
      document.getElementById("form-last").value = surname;

      // 2. Submit the form into the hidden background frame
      document.getElementById("ghl-form").submit();

      // 3. Prepare the final clean redirect link
      var destination = THANKS_ENDPOINT_BASE + "?email=" + encodeURIComponent(email) + "&firstname=" + encodeURIComponent(firstname) + "&surname=" + encodeURIComponent(surname);
      
      // Smart delay to ensure server registration complete
      var delay = 3000; 
      if (email.toLowerCase().endsWith("xtra.co.nz")) {
        delay = 5000;
      }
      
      // 4. Send them straight into the App login screen
      setTimeout(function() { window.location.href = destination; }, delay);
    }
  </script>
</body>
</html>
